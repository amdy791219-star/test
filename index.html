<style>
  :root{
    --paper:#FAF7F0;
    --card:#FFFFFF;
    --ink:#2B2B28;
    --ink-soft:#73705F;
    --teal:#3F6B66;
    --teal-dark:#2C4A46;
    --teal-pale:#E7EFEC;
    --coral:#C1453D;
    --coral-pale:#FBEAE8;
    --blue:#3D6FC1;
    --blue-pale:#EAF0FB;
    --line:#E1DCC9;
    --sage:#EFEBDC;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Newsreader',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:var(--teal-dark);}
  .hidden{display:none !important;}

  /* ---------- Auth screen ---------- */
  #authScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 15% 20%, rgba(63,107,102,0.07), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(193,69,61,0.06), transparent 40%),
      var(--paper);
  }
  .auth-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:40px 36px;
    width:100%;
    max-width:380px;
    box-shadow:0 1px 2px rgba(43,43,40,0.04), 0 12px 32px rgba(43,43,40,0.06);
  }
  .auth-mark{
    width:44px;height:44px;border-radius:10px;
    background:var(--teal);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:18px;
  }
  .auth-mark svg{width:24px;height:24px;}
  .auth-card h1{font-size:24px;margin:0 0 4px;font-weight:600;}
  .auth-card p.sub{color:var(--ink-soft);font-size:13px;margin:0 0 24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em;}
  .field input{
    width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:8px;background:var(--paper);color:var(--ink);
    transition:border-color .15s;
  }
  .field input:focus{outline:none;border-color:var(--teal);}
  .btn{
    border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;
    transition:transform .08s, background .15s, box-shadow .15s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--teal);color:#fff;width:100%;padding:11px;margin-top:6px;}
  .btn-primary:hover{background:var(--teal-dark);}
  .btn-ghost{background:transparent;color:var(--teal-dark);}
  .btn-line{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-line:hover{border-color:var(--teal);}
  .btn-danger-ghost{background:transparent;color:var(--coral);}
  .auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--ink-soft);}
  .auth-switch button{background:none;border:none;color:var(--teal-dark);font-weight:600;padding:0;}
  .auth-error{
    background:var(--coral-pale);color:var(--coral);font-size:13px;
    padding:8px 12px;border-radius:8px;margin-bottom:14px;
  }

  /* ---------- App shell ---------- */
  #app{display:flex;min-height:100vh;}
  #sidebar{
    width:248px;flex:none;background:var(--card);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:20px 16px;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 4px 22px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .brand .auth-mark{width:32px;height:32px;border-radius:8px;margin:0;}
  .brand span{font-family:'Newsreader',serif;font-weight:600;font-size:17px;}
  #petList{flex:1;overflow-y:auto;}
  .pet-chip{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
    cursor:pointer;margin-bottom:4px;color:var(--ink-soft);font-size:14px;font-weight:500;
  }
  .pet-chip:hover{background:var(--sage);}
  .pet-chip.active{background:var(--teal-pale);color:var(--teal-dark);}
  .pet-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex:none;}
  .pet-chip.active .dot{background:var(--teal);}
  #sidebar .btn-line{width:100%;text-align:left;margin-top:8px;}
  .sidebar-footer{border-top:1px solid var(--line);padding-top:14px;margin-top:14px;font-size:13px;color:var(--ink-soft);}
  .sidebar-footer .email{display:block;margin-bottom:8px;word-break:break-all;}

  #main{flex:1;overflow-y:auto;padding:32px 40px;max-width:980px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .topbar h1{font-size:28px;margin:0;font-weight:600;}
  .topbar .meta{color:var(--ink-soft);font-size:13px;margin-top:4px;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;}

  .section-title{font-size:20px;font-weight:600;margin:24px 0 12px;border-bottom:1px solid var(--line);padding-bottom:6px;color:var(--teal-dark);}

  .empty-state{
    border:1px dashed var(--line);border-radius:14px;padding:48px 24px;text-align:center;color:var(--ink-soft);
  }
  .empty-state h3{color:var(--ink);margin:0 0 6px;}

  /* daily log block */
  .daily-log-grid {
    display:grid;grid-template-columns:1fr 1.2fr;gap:20px;margin-bottom:24px;
  }
  .daily-form-card {
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;
  }
  .daily-form-card h3 { margin:0 0 12px 0; font-size:16px; }
  .daily-list-box {
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;max-height:420px;overflow-y:auto;
  }
  .daily-log-item {
    display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;
  }
  .daily-log-item:last-child { border-bottom:none; }
  .daily-log-item .d-date { font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--teal); }
  .daily-log-item .d-vals { margin-top:4px; color:var(--ink); line-height:1.4;}

  /* visit timeline */
  .timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:22px;}
  .visit-row{
    position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:border-color .15s;
  }
  .visit-row:hover{border-color:var(--teal);}
  .visit-row::before{
    content:'';position:absolute;left:-30px;top:18px;width:10px;height:10px;border-radius:50%;
    background:var(--teal);border:2px solid var(--paper);
  }
  .visit-row .vdate{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--teal-dark);font-weight:600;}
  .visit-row .vclinic{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .visit-row .vflags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
  .flag-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
  .flag-pill.high{background:var(--coral-pale);color:var(--coral);}
  .flag-pill.low{background:var(--blue-pale);color:var(--blue);}

  /* panel / test item table */
  .panel-block{border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden;background:var(--card);}
  .panel-head{background:var(--sage);padding:10px 16px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
  .item-row{display:grid;grid-template-columns:1fr 90px 220px;gap:14px;align-items:center;padding:10px 16px;border-top:1px solid var(--line);}
  .item-row .iname{font-size:13.5px;}
  .item-row .ival{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;text-align:right;}
  .item-row .ival.high{color:var(--coral);}
  .item-row .ival.low{color:var(--blue);}
  .range-bar{position:relative;height:8px;background:var(--line);border-radius:4px;}
  .range-bar .normal-zone{position:absolute;top:0;bottom:0;background:var(--teal-pale);border-radius:4px;}
  .range-bar .marker{
    position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;background:var(--ink);
    transform:translateX(-50%);
  }
  .range-bar .marker.high{background:var(--coral);}
  .range-bar .marker.low{background:var(--blue);}
  .range-caption{font-size:10.5px;color:var(--ink-soft);display:flex;justify-content:space-between;margin-top:3px;}

  /* forms / modals */
  .overlay{
    position:fixed;inset:0;background:rgba(43,43,40,0.45);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:50;
  }
  .modal{
    background:var(--card);border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;
    padding:28px 28px 24px;
  }
  .modal h2{margin:0 0 18px;font-size:21px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);min-height:70px;resize:vertical;}
  .panel-editor{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;background:var(--paper);}
  .panel-editor-head{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .panel-editor-head input{flex:1;font-weight:600;}
  .item-edit-row{display:grid;grid-template-columns:1.4fr .8fr .6fr .7fr .7fr 28px;gap:6px;margin-bottom:6px;align-items:center;}
  .item-edit-row input{padding:7px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:12.5px;}
  .icon-btn{background:none;border:none;color:var(--ink-soft);font-size:16px;line-height:1;padding:2px;}
  .icon-btn:hover{color:var(--coral);}
  .preset-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px;}
  .preset-chip{font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);}
  .preset-chip:hover{border-color:var(--teal);color:var(--teal-dark);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid var(--line);padding-top:16px;}

  /* photos */
  .photo-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
  .photo-thumb-wrap{position:relative;width:88px;height:88px;}
  .photo-thumb{width:88px;height:88px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer;display:block;}
  .photo-del-btn{
    position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
    background:var(--coral);color:#fff;border:none;font-size:12px;line-height:1;
    display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .upload-box{border:1px dashed var(--line);border-radius:8px;padding:16px;text-align:center;color:var(--ink-soft);font-size:13px;cursor:pointer;}
  .upload-box:hover{border-color:var(--teal);}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:60;}
  #lightbox img{max-width:92vw;max-height:92vh;border-radius:6px;}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:11px 18px;
    border-radius:8px;font-size:13.5px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.2);
  }
  .crumb{font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  .crumb button{background:none;border:none;color:var(--teal-dark);font-weight:600;padding:0;font-size:13px;}

  select{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);width:100%;}

  .trend-controls{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .trend-controls select{width:auto;min-width:200px;}
  .chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;}

  @media (max-width: 760px){
    #app{flex-direction:column;}
    #sidebar{width:100%;flex-direction:row;overflow-x:auto;align-items:center;}
    #petList{display:flex;flex:none;}
    .pet-chip{white-space:nowrap;}
    .brand{display:none;}
    .sidebar-footer{display:none;}
    #main{padding:20px;}
    .daily-log-grid { grid-template-columns:1fr; }
    .item-row{grid-template-columns:1fr 70px 140px;}
    .item-edit-row{grid-template-columns:1fr;}
  }
</style>
</head>

let currentUser = null;

/* ============================================================
   工具
   ============================================================ */
function toast(msg){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}
function fmtDate(d){
  if(!d) return "";
  const dt = (d instanceof Date) ? d : new Date(d);
  return dt.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
}
function flagFor(value, low, high){
  if(low==null||high==null||value===""||value==null||isNaN(value)) return null;
  const v = parseFloat(value);
  if(v < parseFloat(low)) return "low";
  if(v > parseFloat(high)) return "high";
  return null;
}
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html!==undefined) e.innerHTML = html;
  return e;
}

// 計算精確年齡：幾歲幾個月幾天
function getDetailedAge(birthdateStr) {
  if (!birthdateStr) return "";
  const birth = new Date(birthdateStr);
  const now = new Date();
  if (isNaN(birth.getTime()) || birth > now) return "";

  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();

  if (days < 0) {
    const prevMonthLastDay = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    days += prevMonthLastDay;
    months--;
  }
  if (months < 0) {
    months += 12;
    years--;
  }

  return `（${years}歲${months}個月${days}天）`;
}

/* ============================================================
   照片:壓縮後轉成 base64,直接存進 Firestore(免費,不需要 Storage)
   ============================================================ */
function compressImageToBase64(file, maxDim = 1100, quality = 0.6){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e)=>{ img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = ()=>{
      let { width, height } = img;
      if(width > height && width > maxDim){ height = Math.round(height * (maxDim/width)); width = maxDim; }
      else if(height > maxDim){ width = Math.round(width * (maxDim/height)); height = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadPhotoForVisit(visit, file){
  const dataUrl = await compressImageToBase64(file);
  if(dataUrl.length > 700000){
    toast("這張照片壓縮後仍太大,請換一張較小的照片再試一次");
    return;
  }
  await updateDoc(doc(db,'visits',visit.id), { photoURLs: arrayUnion(dataUrl) });
  toast("照片已新增");
}

}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
function renderItemRow(it){
  const f = flagFor(it.value, it.refLow, it.refHigh);
  const row = el('div','item-row');
  row.appendChild(el('div','iname', it.name + (it.unit?` <span class="mono" style="color:var(--ink-soft);font-size:11px;">(${it.unit})</span>`:'')));
  row.appendChild(el('div','ival'+(f?(' '+f):''), (it.value!==""&&it.value!=null) ? it.value : '—'));
  row.appendChild(renderRangeBar(it.value, it.refLow, it.refHigh, f));
  return row;
}
function renderRangeBar(value, low, high, flag){
  const wrap = el('div','');
  if(low==null || high==null || low==="" || high===""){
    wrap.innerHTML = '<div style="font-size:11px;color:var(--ink-soft);">無參考值</div>';
    return wrap;
  }
  low = parseFloat(low); high = parseFloat(high);
  const span = (high-low) || 1;
  const winLow = low - span*0.4, winHigh = high + span*0.4, winSpan = winHigh-winLow;
  const normLeft = ((low-winLow)/winSpan)*100;
  const normWidth = ((high-low)/winSpan)*100;
  const bar = el('div','range-bar');
  const zone = el('div','normal-zone');
  zone.style.left = normLeft+'%'; zone.style.width = normWidth+'%';
  bar.appendChild(zone);
  if(value!=="" && value!=null && !isNaN(value)){
    let pct = ((parseFloat(value)-winLow)/winSpan)*100;
    pct = Math.max(0, Math.min(100, pct));
    const marker = el('div','marker'+(flag?(' '+flag):''));
    marker.style.left = pct+'%';
    bar.appendChild(marker);
  }
  wrap.appendChild(bar);
  const cap = el('div','range-caption', `<span>${low}</span><span>${high}</span>`);
  wrap.appendChild(cap);
  return wrap;
}

/* ---------- Trends ---------- */
let chartInstance = null;
function renderTrends(pet){
  const main = document.getElementById('main');
  main.appendChild(crumb(pet.name, ()=>{activeView='overview'; renderMain();}));
  const top = el('div','topbar');
  top.appendChild(el('h1','','數據趨勢追蹤'));
  main.appendChild(top);

  const vSorted = (visitsByPet[pet.id]||[]).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));
  const dSorted = (dailyLogsByPet[pet.id]||[]).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));

  const itemNames = new Set();
  itemNames.add("💧 日常: 每日飲水量 (ml)");
  itemNames.add("🍖 日常: 每日飼料量 (g)");
  itemNames.add("⚖️ 日常: 目前體重 (kg)");
  itemNames.add("🫁 日常: 每分鐘呼吸次數");
  
  vSorted.forEach(v=>(v.panels||[]).forEach(p=>(p.items||[]).forEach(it=>{ if(it.name) itemNames.add("🩸 臨床: "+it.name); })));

  const controls = el('div','trend-controls');
  const select = document.createElement('select');
  Array.from(itemNames).forEach(name=>{
    const opt = document.createElement('option'); opt.value=name; opt.textContent=name;
    select.appendChild(opt);
  });
  controls.appendChild(select);
  main.appendChild(controls);

  const chartWrap = el('div','chart-wrap');
  const canvas = document.createElement('canvas');
  canvas.height = 110;
  chartWrap.appendChild(canvas);
  main.appendChild(chartWrap);

  function draw(itemName){
    const points = [];
    let refLow=null, refHigh=null;
    
    if(itemName.includes("日常: ")) {
      const fieldMap = {
        "💧 日常: 每日飲水量 (ml)": "water",
        "🍖 日常: 每日飼料量 (g)": "food",
        "⚖️ 日常: 目前體重 (kg)": "weight",
        "🫁 日常: 每分鐘呼吸次數": "breath"
      };
      const key = fieldMap[itemName];
      dSorted.forEach(log => {
        if(log[key] !== "" && log[key] != null && !isNaN(parseFloat(log[key]))) {
          points.push({x: log.date, y: parseFloat(log[key])});
        }
      });
    } else {
      const pureName = itemName.replace("🩸 臨床: ", "");
      vSorted.forEach(v=>{
        (v.panels||[]).forEach(p=>(p.items||[]).forEach(it=>{
          if(it.name===pureName && it.value!=="" && it.value!=null && !isNaN(parseFloat(it.value))){
            points.push({x: v.date, y: parseFloat(it.value)});
            if(it.refLow!=null && it.refLow!=="") refLow = parseFloat(it.refLow);
            if(it.refHigh!=null && it.refHigh!=="") refHigh = parseFloat(it.refHigh);
          }
        }));
      });
    }

    if(chartInstance) chartInstance.destroy();
    
    if(!points.length) {
      toast("目前該項目尚無足夠的數值產生圖表。");
      return;
    }

    points.sort((a, b) => new Date(a.x) - new Date(b.x));

    const labels = points.map(p => {
      const d = new Date(p.x);
      return `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
    });

    const pointColors = points.map(p=>{
      if(refLow!=null && p.y<refLow) return '#3D6FC1';
      if(refHigh!=null && p.y>refHigh) return '#C1453D';
      return '#3F6B66';
    });

    const datasets = [{
      label: itemName,
      data: points.map(p => p.y),
      borderColor:'#3F6B66',
      backgroundColor:'#3F6B66',
      pointBackgroundColor: pointColors,
      pointRadius:5,
      tension:0.25,
      borderWidth:2,
    }];

    if(refLow!=null && refHigh!=null){
      datasets.push({
        label:'正常範圍上限', data: points.map(()=>refHigh),
        borderColor:'rgba(63,107,102,0.25)', borderDash:[4,4], pointRadius:0, borderWidth:1, fill:'+1'
      });
      datasets.push({
        label:'正常範圍下限', data: points.map(()=>refLow),
        borderColor:'rgba(63,107,102,0.25)', borderDash:[4,4], pointRadius:0, borderWidth:1,
        backgroundColor:'rgba(63,107,102,0.08)'
      });
    }

    chartInstance = new Chart(canvas, {
      type:'line',
      data:{ 
        labels: labels, 
        datasets 
      },
      plugins: [ChartDataLabels], 
      options:{
        responsive:true,
        layout: {
          padding: {
            top: 35,
            left: 10,
            right: 10
          }
        },
        plugins:{ 
          legend: { display: false },
          datalabels: {
            align: 'top',
            anchor: 'end',
            offset: 4,
            backgroundColor: null,
            borderWidth: 0,
            color: '#2B2B28',
            font: {
              weight: '600',
              family: 'IBM Plex Mono, sans-serif',
              size: 12
            },
            formatter: (value, context) => {
              if (context.datasetIndex !== 0) return null;
              return value;
            }
          }
        },
        scales:{
          x:{ 
            type:'category', 
            title:{display:false},
            grid: { display: false } 
          },
          y:{ 
            title:{display:false},
            grace: '15%'
          }
        }
      }
    });
  }

  select.addEventListener('change', (e) => draw(e.target.value));
  if(select.value) draw(select.value);
}

      "ALB": { name: "白蛋白 ALB", panel: "生化檢查" }, "白蛋白": { name: "白蛋白 ALB", panel: "生化檢查" },
      "GLU": { name: "血糖 GLU", panel: "生化檢查" }, "血糖": { name: "血糖 GLU", panel: "生化檢查" },
      "GPT": { name: "丙酮酸轉氨酶 GPT", panel: "生化檢查" }, "ALT": { name: "丙酮酸轉氨酶 GPT", panel: "生化檢查" },
      "ALP": { name: "鹼性磷酸酶 ALP", panel: "生化檢查" },
      "BUN": { name: "血尿素氮 BUN", panel: "生化檢查" },
      "CRE": { name: "肌酸酐 CRE", panel: "生化檢查" }, "CRSC": { name: "肌酸酐 CRE", panel: "生化檢查" },
      "IP": { name: "磷離子 IP", panel: "生化檢查" }, "磷": { name: "磷離子 IP", panel: "生化檢查" }
    };

    const regex = /([A-Za-z\u4e00-\u9fa5\(\)%]+)\s*([0-9]+\.?[0-9]*)/g;
    let match;
    let successCount = 0;

    addPanel("CBC 血液檢查", PRESETS["CBC 血液檢查"]);

    while ((match = regex.exec(cleanedText)) !== null) {
      const rawName = match[1].trim();
      const value = match[2].trim();

      let matchedConfig = null;
      for (let key in matchMap) {
        if (rawName.toUpperCase().includes(key.toUpperCase())) {
          matchedConfig = matchMap[key];
          break;
        }
      }

      if (matchedConfig) {
        const targetPanelBlock = addPanel(matchedConfig.panel);
        const rows = targetPanelBlock.querySelectorAll('.item-edit-row');
        
        for (let row of rows) {
          const nameInput = row.querySelector('.itName');
          if (nameInput.value.toUpperCase().includes(rawName.toUpperCase()) || matchedConfig.name.includes(nameInput.value)) {
            row.querySelector('.itValue').value = value;
            successCount++;
            break;
          }
        }
      }
    }

    if(successCount > 0) {
      toast(`✨ 成功自動解析並填入 ${successCount} 項數值!`);
      modal.querySelector('#mOcrInput').value = "";
    } else {
      toast("無法辨識文字中的項目,請確認格式是否正確。");
    }
  });

  modal.querySelector('#mSaveVisit').addEventListener('click', async ()=>{
    const date = modal.querySelector('#mDate').value;
    if(!date){ toast("請選擇回診日期"); return; }
    const panels = [];
    panelsEditor.querySelectorAll('.panel-editor').forEach(block=>{
      const pname = block.querySelector('.panelName').value.trim();
      const items = [];
      block.querySelectorAll('.item-edit-row').forEach(row=>{
        const name = row.querySelector('.itName').value.trim();
        if(!name) return;
        items.push({
          name,
          value: row.querySelector('.itValue').value.trim(),
          unit: row.querySelector('.itUnit').value.trim(),
          refLow: row.querySelector('.itLow').value.trim(),
          refHigh: row.querySelector('.itHigh').value.trim(),
        });
      });
      if(pname || items.length) panels.push({name: pname || '未命名面板', items});
    });
    const data = {
      date,
      clinicName: modal.querySelector('#mClinic').value.trim(),
      vetName: modal.querySelector('#mVet').value.trim(),
      notes: modal.querySelector('#mNotes').value.trim(),
      panels,
    };
    if(visit) await updateVisit(visit.id, data);
    else await createVisit(pet.id, data);
    overlay.remove();
  });
}
